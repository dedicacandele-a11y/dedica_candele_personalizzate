<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Accesso — DÈDICA</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="announcement">Account cliente · Pagamenti sicuri con Stripe</div>
  <header class="site-header">
    <div class="container navbar">
      <nav class="nav-left"><a class="nav-link" href="index.html">Home</a><a class="nav-link" href="cart.html">Carrello</a></nav>
      <a class="brand" href="index.html"><img src="assets/logo.svg" alt="DÈDICA"></a>
      <div class="nav-actions"><a class="btn btn-primary" href="configuratore.html">Crea la tua candela</a></div>
    </div>
  </header>

  <main class="page-hero">
    <div class="container" style="max-width:620px;">
      <div class="section-head" style="display:block;">
        <span class="eyebrow">Area riservata</span>
        <h1 class="title">Accedi o crea il tuo account.</h1>
        <p class="lead">Usiamo l'account per collegare pagamento, bozza digitale e comunicazioni sull'ordine.</p>
      </div>
      <div class="config-form-card">
        <form id="authForm">
          <div class="field">
            <label for="authEmail">Email</label>
            <input id="authEmail" class="input" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="authPassword">Password</label>
            <input id="authPassword" class="input" type="password" autocomplete="current-password" required minlength="6">
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn btn-primary" id="loginBtn" type="submit" style="border:none;">Accedi</button>
            <button class="btn btn-secondary" id="registerBtn" type="button">Registrati</button>
          </div>
          <button class="btn btn-light" id="resetBtn" type="button" style="width:100%; margin-top:10px;">Recupera password</button>
        </form>
      </div>
    </div>
  </main>
  <div class="toast"></div>
  <script type="module" src="auth.js"></script>
</body>
</html>
